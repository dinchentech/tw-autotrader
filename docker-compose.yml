services:
  autotrader:
    image: tw-autotrader:latest
    container_name: tw_autotrader_bot
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs         # 只持久化 logs，程式碼走 image
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
