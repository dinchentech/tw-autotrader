services:
  autotrader:
    image: tw-autotrader:latest
    container_name: tw_autotrader_bot
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      # 持久化 logs
      - ./logs:/app/logs
      # 程式碼手動掛載（改 .py 只需 restart，不用重 build）
      - ./live_trader_multi.py:/app/live_trader_multi.py
      - ./pyarmor_runtime_000000:/app/pyarmor_runtime_000000
      - ./strategies:/app/strategies
      - ./core:/app/core
      - ./data:/app/data
      - ./utils:/app/utils
      - ./config:/app/config
      - ./scripts:/app/scripts
      - ./esun_sdk:/app/esun_sdk
      # FinMind 快取（避免跨重啟重複下載）
      - ./cache:/app/cache
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
