<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>均線交叉策略 — 動畫說明</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: hsl(220, 18%, 10%); }
  body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans TC', sans-serif; color: #e8e8e8; user-select: none; }

  #stage { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
  #canvas-wrap { flex: 1; position: relative; overflow: hidden; }
  #canvas-wrap svg { display: block; width: 100%; height: 100%; }

  .scene-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    pointer-events: none; opacity: 0;
    transition: opacity 0.8s ease;
  }
  .scene-overlay.active { opacity: 1; }

  .scene-title {
    font-size: clamp(2rem, 5vw, 4.5rem);
    font-weight: 700; letter-spacing: 0.02em;
    text-align: center; line-height: 1.3;
    text-shadow: 0 2px 20px rgba(0,0,0,0.6);
  }
  .scene-sub {
    font-size: clamp(1rem, 2vw, 1.6rem);
    font-weight: 400; color: hsl(192, 40%, 70%);
    margin-top: 0.6em; letter-spacing: 0.03em;
  }
  .scene-accent { color: #0891B2; }

  #s1 .scene-title { font-size: clamp(2.2rem, 5.5vw, 5rem); }
  #s2 .scene-sub { font-size: clamp(0.85rem, 1.6vw, 1.3rem); max-width: 75vw; }

  .buy-sell-title {
    display: flex; align-items: center; gap: 1.2em; margin-bottom: 0.5em;
  }
  .signal-badge {
    display: inline-block;
    font-size: clamp(1.2rem, 2.5vw, 2rem);
    font-weight: 800; padding: 0.3em 0.8em;
    border-radius: 4px; letter-spacing: 0.05em;
  }
  .signal-badge.buy { background: hsl(160, 60%, 30%); color: #fff; }
  .signal-badge.sell { background: hsl(0, 55%, 40%); color: #fff; }

  .condition-row {
    display: flex; gap: 1em; flex-wrap: wrap; justify-content: center; margin-top: 1em;
  }
  .condition-chip {
    background: hsla(0,0%,100%,0.08);
    border: 1px solid hsla(0,0%,100%,0.12);
    padding: 0.4em 1em; border-radius: 4px;
    font-size: clamp(0.75rem, 1.2vw, 1rem);
    color: hsl(192, 20%, 70%);
  }
  .condition-chip.active { border-color: #0891B2; color: #0891B2; }

  #s4 .scene-title { font-size: clamp(1.8rem, 4vw, 3.5rem); }
  .summary-quote {
    margin-top: 1.5em;
    font-size: clamp(1.1rem, 2vw, 1.8rem);
    font-weight: 500; color: #0891B2;
    letter-spacing: 0.04em;
    border-top: 1px solid hsla(192,80%,50%,0.3);
    padding-top: 0.8em;
  }

  #controls {
    height: 56px; flex-shrink: 0;
    display: flex; align-items: center; gap: 14px;
    padding: 0 24px;
    background: hsl(220, 15%, 13%);
    border-top: 1px solid hsla(0,0%,100%,0.06);
  }
  #play-btn {
    width: 32px; height: 32px; flex-shrink: 0;
    background: none; border: none; cursor: pointer;
    color: hsl(192, 30%, 70%); font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; transition: background 0.2s;
  }
  #play-btn:hover { background: hsla(0,0%,100%,0.08); }
  #play-btn svg { width: 18px; height: 18px; fill: currentColor; }

  #progress-track {
    flex: 1; height: 4px; background: hsla(0,0%,100%,0.12);
    border-radius: 2px; cursor: pointer; position: relative;
  }
  #progress-fill { height: 100%; width: 0%; background: #0891B2; border-radius: 2px; transition: width 50ms linear; }
  #progress-thumb {
    position: absolute; top: 50%; left: 0%;
    width: 12px; height: 12px; border-radius: 50%;
    background: #0891B2; transform: translate(-50%, -50%);
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  #progress-track:hover #progress-thumb { opacity: 1; }

  #time-label {
    font-size: 12px; color: hsla(0,0%,100%,0.4);
    font-variant-numeric: tabular-nums;
    width: 60px; text-align: right; flex-shrink: 0;
  }

  #scene-indicators { display: flex; gap: 6px; flex-shrink: 0; }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: hsla(0,0%,100%,0.2);
    transition: all 0.4s ease;
  }
  .dot.active { background: #0891B2; transform: scale(1.4); }
  .dot.done { background: hsla(192, 60%, 40%, 0.5); }

  @media (max-width: 768px) {
    #controls { height: 48px; padding: 0 12px; gap: 10px; }
    #s1 .scene-title, .scene-title { font-size: clamp(1.4rem, 6vw, 2.2rem); }
    .scene-sub { font-size: clamp(0.7rem, 2.5vw, 1rem); }
    .buy-sell-title { flex-direction: column; gap: 0.5em; }
  }
</style>
</head>
<body>

<div id="stage">
  <div id="canvas-wrap">
    <svg id="chart" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet"></svg>

    <!-- Scene 1: Problem -->
    <div class="scene-overlay" id="s1" style="justify-content:flex-end;padding-bottom:12vh;">
      <div class="scene-title">波段行情來了<br><span style="color:#0891B2;">如何不被甩轎？</span></div>
      <div class="scene-sub">📊 何時進場 · 📊 何時出場</div>
    </div>

    <!-- Scene 2: MA Cross Explained -->
    <div class="scene-overlay" id="s2" style="justify-content:flex-end;padding-bottom:12vh;">
      <div class="scene-title">黃金交叉 vs 死亡交叉<br><span class="scene-accent">雙均線的波段訊號</span></div>
      <div class="scene-sub">
        <span style="display:inline-block;width:12px;height:12px;background:hsl(192,80%,60%);border-radius:2px;vertical-align:middle;margin-right:6px;"></span> 快線 MA9：短期成本（反應靈敏）
        <span style="display:inline-block;width:12px;height:12px;background:hsl(0,0%,70%);border-radius:2px;vertical-align:middle;margin:0 6px 0 20px;"></span> 慢線 MA21：中期成本（趨勢方向）
        <span style="display:inline-block;margin-left:20px;font-size:0.85em;color:hsl(192,20%,50%);">ATR 過濾盤整假訊號</span>
      </div>
    </div>

    <!-- Scene 3: Golden Cross Buy -->
    <div class="scene-overlay" id="s3" style="justify-content:flex-end;padding-bottom:30vh;">
      <div class="buy-sell-title">
        <span class="signal-badge buy">BUY</span>
        <span class="scene-title" style="font-size:clamp(1.8rem,4.5vw,3.8rem);">黃金交叉</span>
      </div>
      <div class="scene-sub" style="font-size:clamp(1rem,2vw,1.8rem);">
        短線買盤扭轉中期趨勢 <span style="color:#f59e0b;font-weight:600;">⤴</span> 波段漲勢確立
      </div>
      <div class="condition-row">
        <span class="condition-chip active">MA9 向上突破 MA21（黃金交叉）</span>
        <span class="condition-chip active" style="border-color:#0D9488;color:#0D9488;">ATR / 股價 ≥ 0.5%（波動足夠）</span>
      </div>
    </div>

    <!-- Scene 4: Death Cross + Summary -->
    <div class="scene-overlay" id="s4" style="justify-content:flex-end;padding-bottom:30vh;">
      <div class="buy-sell-title">
        <span class="signal-badge sell">SELL</span>
        <span class="scene-title" style="font-size:clamp(1.8rem,4.5vw,3.8rem);">死亡交叉</span>
      </div>
      <div class="scene-sub" style="font-size:clamp(1rem,2vw,1.8rem);">
        追價力道枯竭 <span style="color:#f59e0b;font-weight:600;">⤵</span> 多頭行情結束
      </div>
      <div class="condition-row">
        <span class="condition-chip active">MA9 跌破 MA21（死亡交叉）</span>
        <span class="condition-chip active" style="border-color:#0D9488;color:#0D9488;">ATR / 股價 ≥ 0.5%（波動足夠）</span>
      </div>
      <div class="summary-quote">順勢而為 — 金叉買進，死叉賣出，完整參與波段</div>
    </div>

    <div style="position:absolute;top:24px;right:32px;display:flex;gap:8px;pointer-events:none;">
      <div class="dot" data-idx="0"></div>
      <div class="dot" data-idx="1"></div>
      <div class="dot" data-idx="2"></div>
      <div class="dot" data-idx="3"></div>
    </div>
    <div style="position:absolute;top:24px;left:32px;pointer-events:none;font-size:13px;color:hsla(0,0%,100%,0.25);letter-spacing:0.05em;font-weight:500;">
      MA CROSS · ATR
    </div>
  </div>

  <div id="controls">
    <button id="play-btn" aria-label="播放/暫停">
      <svg viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>
    </button>
    <div id="progress-track">
      <div id="progress-fill"></div>
      <div id="progress-thumb"></div>
    </div>
    <div id="scene-indicators">
      <span class="dot active" data-idx="0"></span>
      <span class="dot" data-idx="1"></span>
      <span class="dot" data-idx="2"></span>
      <span class="dot" data-idx="3"></span>
    </div>
    <div id="time-label">0:00</div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   MA Cross (Golden Cross / Death Cross) Strategy Animation
   ═══════════════════════════════════════════════════════════════ */

const SCENE_DURATIONS = [10, 18, 18, 18];
const TOTAL_DURATION = SCENE_DURATIONS.reduce((a,b)=>a+b, 0);

const svg = document.getElementById('chart');
const NS = 'http://www.w3.org/2000/svg';
const playBtn = document.getElementById('play-btn');
const progressFill = document.getElementById('progress-fill');
const progressThumb = document.getElementById('progress-thumb');
const progressTrack = document.getElementById('progress-track');
const timeLabel = document.getElementById('time-label');
const overlays = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3'), document.getElementById('s4')];
const allDots = document.querySelectorAll('.dot');

let playing = true;
let elapsed = 0;
let lastTs = 0;
let rafId = null;

/* ── Price Data Generation ──
   We need a clear cycle: downtrend → golden cross → uptrend → death cross → downtrend */
function generatePriceData(n) {
  const prices = [];
  let p = 100;
  for (let i = 0; i < n; i++) {
    const t = i / n;
    // Phase 1 (0-30%): downtrend
    // Phase 2 (30-50%): bottoming, then golden cross & reversal
    // Phase 3 (50-75%): strong uptrend
    // Phase 4 (75-100%): topping, death cross & decline
    let drift = 0;
    if (t < 0.20) drift = -0.15;
    else if (t < 0.35) drift = -0.05;
    else if (t < 0.55) drift = 0.10;
    else if (t < 0.75) drift = 0.20;
    else if (t < 0.88) drift = -0.05;
    else drift = -0.15;

    const noise = (Math.random() - 0.5) * 0.5;
    p = p + drift * 0.35 + noise * 0.2;
    p = Math.max(p, 85);
    p = Math.min(p, 120);
    prices.push(Math.round(p * 100) / 100);
  }
  return prices;
}

function generateHighLow(prices) {
  const high = [], low = [];
  for (let i = 0; i < prices.length; i++) {
    const spread = (Math.random() * 0.5 + 0.3);
    high.push(prices[i] + spread);
    low.push(prices[i] - spread);
  }
  return { high, low };
}

const PRICE_DATA = generatePriceData(140);
const N = PRICE_DATA.length;
const { high: HIGH_DATA, low: LOW_DATA } = generateHighLow(PRICE_DATA);

// Moving averages
function sma(data, period) {
  const result = [];
  for (let i = 0; i < data.length; i++) {
    if (i < period - 1) { result.push(null); continue; }
    let sum = 0;
    for (let j = i - period + 1; j <= i; j++) sum += data[j];
    result.push(sum / period);
  }
  return result;
}
const MA9 = sma(PRICE_DATA, 9);
const MA21 = sma(PRICE_DATA, 21);

// ATR(14)
function calcATR(high, low, close, period) {
  const result = [];
  for (let i = 0; i < high.length; i++) {
    if (i === 0) { result.push(null); continue; }
    if (i < period) { result.push(null); continue; }
    let sum = 0;
    for (let j = i - period + 1; j <= i; j++) {
      const hh = high[j] - low[j];
      const hcc = Math.abs(high[j] - close[j-1]);
      const lcc = Math.abs(low[j] - close[j-1]);
      sum += Math.max(hh, hcc, lcc);
    }
    result.push(sum / period);
  }
  return result;
}
const ATR_DATA = calcATR(HIGH_DATA, LOW_DATA, PRICE_DATA, 14);
const ATR_RATIO = ATR_DATA.map((a, i) => a !== null ? a / PRICE_DATA[i] : null);

// Scaling
const allVals = [].concat(PRICE_DATA).filter(v => v !== null);
// include MA values for scale
for (let i = 0; i < N; i++) {
  if (MA9[i] !== null) allVals.push(MA9[i]);
  if (MA21[i] !== null) allVals.push(MA21[i]);
}
let priceMin = Math.min(...allVals), priceMax = Math.max(...allVals);
const pad = (priceMax - priceMin) * 0.15;
priceMin -= pad; priceMax += pad;

function p2y(p) { return 600 - ((p - priceMin) / (priceMax - priceMin)) * 520 - 40; }
function x(i) { return 30 + (i / (N - 1)) * 940; }

/* ── Chart Building ── */
function buildChart() {
  svg.innerHTML = '';
  const defs = document.createElementNS(NS, 'defs');
  defs.innerHTML = `
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-red"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="upGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="hsla(160,60%,40%,0.15)"/>
      <stop offset="100%" stop-color="hsla(160,60%,40%,0.02)"/>
    </linearGradient>
    <linearGradient id="dnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="hsla(0,55%,50%,0.15)"/>
      <stop offset="100%" stop-color="hsla(0,55%,50%,0.02)"/>
    </linearGradient>
  `;
  svg.appendChild(defs);

  // Grid
  for (let y = 60; y < 560; y += 80) {
    const line = document.createElementNS(NS, 'line');
    line.setAttribute('x1', '30'); line.setAttribute('x2', '970');
    line.setAttribute('y1', y); line.setAttribute('y2', y);
    line.setAttribute('stroke', 'hsla(0,0%,100%,0.04)');
    line.setAttribute('stroke-width', '1');
    svg.appendChild(line);
  }

  // MA9 line
  const ma9Path = document.createElementNS(NS, 'path');
  ma9Path.id = 'ma9-line';
  ma9Path.setAttribute('fill', 'none');
  ma9Path.setAttribute('stroke', 'hsl(192,80%,60%)');
  ma9Path.setAttribute('stroke-width', '2.5');
  ma9Path.setAttribute('filter', 'url(#glow)');
  svg.appendChild(ma9Path);

  // MA21 line
  const ma21Path = document.createElementNS(NS, 'path');
  ma21Path.id = 'ma21-line';
  ma21Path.setAttribute('fill', 'none');
  ma21Path.setAttribute('stroke', 'hsla(0,0%,70%,0.5)');
  ma21Path.setAttribute('stroke-width', '2');
  ma21Path.setAttribute('stroke-dasharray', '6,4');
  svg.appendChild(ma21Path);

  // Price line (subtle but visible)
  const pricePath = document.createElementNS(NS, 'path');
  pricePath.id = 'price-line';
  pricePath.setAttribute('fill', 'none');
  pricePath.setAttribute('stroke', 'hsla(42,80%,55%,0.55)');
  pricePath.setAttribute('stroke-width', '1.5');
  svg.appendChild(pricePath);

  // Cross marker layer
  const crossG = document.createElementNS(NS, 'g');
  crossG.id = 'cross-markers';
  svg.appendChild(crossG);

  // ATR indicator
  const atrG = document.createElementNS(NS, 'g');
  atrG.id = 'atr-group';
  svg.appendChild(atrG);

  // Labels
  const lbl1 = document.createElementNS(NS, 'text');
  lbl1.setAttribute('x', '28'); lbl1.setAttribute('y', '48');
  lbl1.setAttribute('fill', 'hsl(192,80%,60%)');
  lbl1.setAttribute('font-size', '11');
  lbl1.setAttribute('font-family', 'system-ui');
  lbl1.textContent = 'MA9 快線';
  svg.appendChild(lbl1);

  const lbl2 = document.createElementNS(NS, 'text');
  lbl2.setAttribute('x', '28'); lbl2.setAttribute('y', '64');
  lbl2.setAttribute('fill', 'hsla(0,0%,70%,0.5)');
  lbl2.setAttribute('font-size', '11');
  lbl2.setAttribute('font-family', 'system-ui');
  lbl2.textContent = 'MA21 慢線';
  svg.appendChild(lbl2);
}

/* ── Chart Update ── */
function updateChart(revealIdx) {
  const visible = Math.max(1, Math.floor(revealIdx));
  const ma9Line = document.getElementById('ma9-line');
  const ma21Line = document.getElementById('ma21-line');
  const priceLine = document.getElementById('price-line');
  const crossG = document.getElementById('cross-markers');
  const atrGroup = document.getElementById('atr-group');
  const sceneIdx = getSceneAtTime(elapsed);

  let ma9D = '', ma21D = '', priceD = '';
  for (let i = 0; i < Math.min(visible, N); i++) {
    const xi = x(i);
    if (MA9[i] !== null) ma9D += (ma9D === '' ? 'M' : 'L') + xi + ',' + p2y(MA9[i]);
    if (MA21[i] !== null) ma21D += (ma21D === '' ? 'M' : 'L') + xi + ',' + p2y(MA21[i]);
    const py = p2y(PRICE_DATA[i]);
    priceD += (priceD === '' ? 'M' : 'L') + xi + ',' + py;
  }
  ma9Line.setAttribute('d', ma9D || 'M0,0');
  ma21Line.setAttribute('d', ma21D || 'M0,0');
  priceLine.setAttribute('d', priceD || 'M0,0');

  // Fill between MA9 and MA21 (divergence area)
  // Remove old fill
  const oldFill = document.getElementById('ma-fill');
  if (oldFill) oldFill.remove();
  if (MA9[0] !== null && MA21[0] !== null) {
    let fillD = '';
    // Go forward along MA9
    for (let i = 0; i < Math.min(visible, N); i++) {
      if (MA9[i] !== null && MA21[i] !== null) {
        fillD += (i === 0 ? 'M' : 'L') + x(i) + ',' + p2y(MA9[i]);
      }
    }
    // Go backward along MA21
    for (let i = Math.min(visible, N) - 1; i >= 0; i--) {
      if (MA9[i] !== null && MA21[i] !== null) {
        fillD += 'L' + x(i) + ',' + p2y(MA21[i]);
      }
    }
    fillD += 'Z';
    const fill = document.createElementNS(NS, 'path');
    fill.id = 'ma-fill';
    fill.setAttribute('d', fillD);
    // Use green gradient when MA9 > MA21, red when below
    const lastIdx = Math.min(visible, N) - 1;
    const isGreen = MA9[lastIdx] !== null && MA21[lastIdx] !== null && MA9[lastIdx] > MA21[lastIdx];
    fill.setAttribute('fill', isGreen ? 'url(#upGrad)' : 'url(#dnGrad)');
    fill.setAttribute('stroke', 'none');
    svg.insertBefore(fill, ma9Line);
  }

  // Cross markers
  crossG.innerHTML = '';
  const isBuyScene = (sceneIdx === 2);
  const isSellScene = (sceneIdx === 3);

  let crossIdx = -1;
  if (isBuyScene || isSellScene) {
    // Find the cross point
    for (let i = 21; i < Math.min(visible, N); i++) {
      if (MA9[i-1] !== null && MA21[i-1] !== null &&
          MA9[i] !== null && MA21[i] !== null) {
        if ((isBuyScene && MA9[i-1] <= MA21[i-1] && MA9[i] > MA21[i]) ||
            (isSellScene && MA9[i-1] >= MA21[i-1] && MA9[i] < MA21[i])) {
          crossIdx = i;
          break;
        }
      }
    }
    if (crossIdx === -1) {
      // Fallback: if no exact cross yet, find the widest point
      for (let i = 21; i < Math.min(visible, N); i++) {
        if (MA9[i] !== null && MA21[i] !== null) {
          if ((isBuyScene && MA9[i] > MA21[i]) ||
              (isSellScene && MA9[i] < MA21[i])) {
            crossIdx = i;
            break;
          }
        }
      }
    }
    if (crossIdx !== -1) {
      const cx = x(crossIdx), cy = p2y(MA9[crossIdx]);
      // Glow circle
      const c = document.createElementNS(NS, 'circle');
      c.setAttribute('cx', cx); c.setAttribute('cy', cy);
      c.setAttribute('r', '10');
      c.setAttribute('fill', 'none');
      c.setAttribute('stroke', isBuyScene ? '#0D9488' : '#ef4444');
      c.setAttribute('stroke-width', '3');
      c.setAttribute('opacity', '0.5');
      c.setAttribute('filter', 'url(#glow-red)');
      crossG.appendChild(c);
      // Solid dot
      const dot = document.createElementNS(NS, 'circle');
      dot.setAttribute('cx', cx); dot.setAttribute('cy', cy);
      dot.setAttribute('r', '5');
      dot.setAttribute('fill', isBuyScene ? '#0D9488' : '#ef4444');
      crossG.appendChild(dot);
      // Cross label
      const label = document.createElementNS(NS, 'text');
      label.setAttribute('x', cx); label.setAttribute('y', cy - 18);
      label.setAttribute('text-anchor', 'middle');
      label.setAttribute('font-size', '13');
      label.setAttribute('font-weight', '700');
      label.setAttribute('fill', isBuyScene ? '#0D9488' : '#ef4444');
      label.setAttribute('font-family', 'system-ui');
      label.textContent = isBuyScene ? '★ 黃金交叉' : '✕ 死亡交叉';
      label.setAttribute('filter', 'url(#glow)');
      crossG.appendChild(label);
    }
  }

  // ATR indicator
  atrGroup.innerHTML = '';
  if (visible > 20) {
    // 買/賣場景鎖定顯示交叉當下的 ATR，而非最後一根 K 棒
    let atrVal;
    if ((isBuyScene || isSellScene) && crossIdx >= 0) {
      atrVal = ATR_RATIO[crossIdx];
    } else {
      const i = Math.min(visible - 1, ATR_RATIO.length - 1);
      atrVal = ATR_RATIO[i];
    }
    if (atrVal !== null) {
      const threshold = 0.005; // 0.5%
      const aboveThreshold = atrVal >= threshold;

      const gx = 840, gy = 30, gw = 135, gh = 50;

      const bg = document.createElementNS(NS, 'rect');
      bg.setAttribute('x', gx); bg.setAttribute('y', gy);
      bg.setAttribute('width', gw); bg.setAttribute('height', gh);
      bg.setAttribute('rx', '4');
      bg.setAttribute('fill', 'hsla(0,0%,0%,0.5)');
      bg.setAttribute('stroke', aboveThreshold ? '#0D9488' : 'hsla(0,0%,100%,0.12)');
      bg.setAttribute('stroke-width', '1');
      atrGroup.appendChild(bg);

      const title = document.createElementNS(NS, 'text');
      title.setAttribute('x', gx + gw/2); title.setAttribute('y', gy + 17);
      title.setAttribute('text-anchor', 'middle');
      title.setAttribute('fill', 'hsla(0,0%,100%,0.5)');
      title.setAttribute('font-size', '10');
      title.setAttribute('font-family', 'system-ui');
      title.textContent = 'ATR / 股價';
      atrGroup.appendChild(title);

      const valText = document.createElementNS(NS, 'text');
      valText.setAttribute('x', gx + gw/2); valText.setAttribute('y', gy + 38);
      valText.setAttribute('text-anchor', 'middle');
      valText.setAttribute('fill', aboveThreshold ? '#0D9488' : 'hsl(0,0%,70%)');
      valText.setAttribute('font-size', '18');
      valText.setAttribute('font-weight', '700');
      valText.setAttribute('font-family', 'system-ui');
      valText.textContent = (atrVal * 100).toFixed(2) + '%';
      atrGroup.appendChild(valText);

      // Mini bar
      const barX = gx + 15, barY = gy + 44, barW = gw - 30, barH = 4;
      const maxDisplay = 0.02;
      const barBg = document.createElementNS(NS, 'rect');
      barBg.setAttribute('x', barX); barBg.setAttribute('y', barY);
      barBg.setAttribute('width', barW); barBg.setAttribute('height', barH);
      barBg.setAttribute('rx', '2');
      barBg.setAttribute('fill', 'hsla(0,0%,100%,0.1)');
      atrGroup.appendChild(barBg);

      // Threshold marker
      const threshX = barX + (threshold / maxDisplay) * barW;
      const threshLine = document.createElementNS(NS, 'line');
      threshLine.setAttribute('x1', threshX); threshLine.setAttribute('y1', barY - 2);
      threshLine.setAttribute('x2', threshX); threshLine.setAttribute('y2', barY + barH + 2);
      threshLine.setAttribute('stroke', 'hsla(0,0%,100%,0.3)');
      threshLine.setAttribute('stroke-width', '1');
      threshLine.setAttribute('stroke-dasharray', '2,2');
      atrGroup.appendChild(threshLine);

      const fillW = Math.min(Math.max((atrVal / maxDisplay) * barW, 0), barW);
      const barFill = document.createElementNS(NS, 'rect');
      barFill.setAttribute('x', barX); barFill.setAttribute('y', barY);
      barFill.setAttribute('width', Math.max(fillW, 0)); barFill.setAttribute('height', barH);
      barFill.setAttribute('rx', '2');
      barFill.setAttribute('fill', aboveThreshold ? '#0D9488' : 'hsl(192,50%,50%)');
      atrGroup.appendChild(barFill);
    }
  }
}

/* ── Scene Management ── */
function getSceneAtTime(t) {
  let acc = 0;
  for (let i = 0; i < SCENE_DURATIONS.length; i++) { acc += SCENE_DURATIONS[i]; if (t < acc) return i; }
  return SCENE_DURATIONS.length - 1;
}

function updateScenes(t) {
  const current = getSceneAtTime(t);
  overlays.forEach((el, i) => el.classList.toggle('active', i === current));
  allDots.forEach((dot, i) => {
    dot.classList.toggle('active', i === current);
    dot.classList.toggle('done', i < current);
  });
}

/* ── Main Loop ── */
function loop(ts) {
  if (!lastTs) lastTs = ts;
  const dt = (ts - lastTs) / 1000;
  lastTs = ts;

  if (playing) {
    elapsed += dt;
    if (elapsed >= TOTAL_DURATION) { elapsed = TOTAL_DURATION; playing = false; updatePlayButton(); }
  }

  const progress = Math.min(elapsed / TOTAL_DURATION, 1);
  progressFill.style.width = (progress * 100) + '%';
  progressThumb.style.left = (progress * 100) + '%';

  const mins = Math.floor(elapsed / 60);
  const secs = Math.floor(elapsed % 60);
  timeLabel.textContent = mins + ':' + String(secs).padStart(2, '0');

  const revealProgress = Math.min(elapsed / 3, 1);
  updateChart(revealProgress * N);
  updateScenes(elapsed);

  rafId = requestAnimationFrame(loop);
}

function updatePlayButton() {
  playBtn.innerHTML = playing
    ? '<svg viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>'
    : '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
}

playBtn.addEventListener('click', () => {
  playing = !playing;
  if (playing) { lastTs = 0; if (elapsed >= TOTAL_DURATION) elapsed = 0; rafId = requestAnimationFrame(loop); }
  updatePlayButton();
});

progressTrack.addEventListener('click', (e) => {
  const rect = progressTrack.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  elapsed = Math.min(pct * TOTAL_DURATION, TOTAL_DURATION);
  if (!playing) { playing = true; lastTs = 0; rafId = requestAnimationFrame(loop); updatePlayButton(); }
});

buildChart();
lastTs = 0;
rafId = requestAnimationFrame(loop);
updatePlayButton();
</script>
