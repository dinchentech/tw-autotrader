name: Deploy Dashboard

on:
  schedule:
    # 每日 14:00 Taipei（06:00 UTC），週一至週五
    - cron: '0 6 * * 1-5'
  workflow_dispatch:   # 手動觸發

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Ensure VM is running
        run: |
          STATUS=$(gcloud compute instances describe tw-autotrader \
            --zone=asia-east1-b --format='get(status)')
          if [ "$STATUS" != "RUNNING" ]; then
            echo "🔄 VM 狀態: $STATUS → 正在啟動..."
            gcloud compute instances start tw-autotrader --zone=asia-east1-b
            echo "⏳ 等待 VM 開機..."
            sleep 60
          else
            echo "✅ VM 已在運行"
          fi

      - name: Fetch dashboard.html from VM via SSH
        run: |
          # 取得 VM 外部 IP
          EXT_IP=$(gcloud compute instances describe tw-autotrader \
            --zone=asia-east1-b --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "🌐 VM IP: $EXT_IP"

          # 寫入 SSH 金鑰
          mkdir -p ~/.ssh
          echo "${{ secrets.GH_SSH_KEY }}" > ~/.ssh/gh_actions
          chmod 600 ~/.ssh/gh_actions

          # 抓取 dashboard.html
          ssh -i ~/.ssh/gh_actions -o StrictHostKeyChecking=no \
            github-actions@$EXT_IP \
            "cat /home/frank/tw-autotrader/logs/dashboard.html" \
            > ./dashboard.html

          # 若不存在則遠端產生
          if [ ! -s ./dashboard.html ]; then
            echo "⚠️  dashboard.html 不存在，遠端產生中..."
            ssh -i ~/.ssh/gh_actions -o StrictHostKeyChecking=no \
              github-actions@$EXT_IP \
              "sudo docker exec tw_autotrader_bot python -c 'from scripts.generate_dashboard import main; main()'"
            ssh -i ~/.ssh/gh_actions -o StrictHostKeyChecking=no \
              github-actions@$EXT_IP \
              "cat /home/frank/tw-autotrader/logs/dashboard.html" \
              > ./dashboard.html
          fi

          if [ -s ./dashboard.html ]; then
            echo "✅ dashboard.html 已取得 ($(wc -c < ./dashboard.html) bytes)"
          else
            echo "❌ 無法取得 dashboard.html"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          destination_dir: ./
          keep_files: false
          enable_jekyll: false
