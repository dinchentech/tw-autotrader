name: Deploy Dashboard

on:
  schedule:
    # 每日 13:45 Taipei（05:45 UTC），週一至週五，VM 關機前 15 分鐘
    - cron: '45 5 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Ensure VM is running
        run: |
          STATUS=$(gcloud compute instances describe tw-autotrader \
            --zone=asia-east1-b --format='get(status)')
          if [ "$STATUS" != "RUNNING" ]; then
            echo "🔄 VM 狀態: $STATUS → 正在啟動..."
            gcloud compute instances start tw-autotrader --zone=asia-east1-b
            echo "⏳ 等待 VM 開機..."
            sleep 60
          else
            echo "✅ VM 已在運行"
          fi

      - name: Fetch dashboard.html from VM via SSH
        run: |
          EXT_IP=$(gcloud compute instances describe tw-autotrader \
            --zone=asia-east1-b --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "🌐 VM IP: $EXT_IP"
          mkdir -p ~/.ssh
          echo "${{ secrets.GH_SSH_KEY }}" > ~/.ssh/gh_actions
          chmod 600 ~/.ssh/gh_actions
          ssh -i ~/.ssh/gh_actions -o StrictHostKeyChecking=no \
            github-actions@$EXT_IP \
            "cat /home/frank/tw-autotrader/logs/dashboard.html" \
            > ./dashboard.html
          if [ ! -s ./dashboard.html ]; then
            echo "⚠️  dashboard.html 不存在，遠端產生中..."
            ssh -i ~/.ssh/gh_actions -o StrictHostKeyChecking=no \
              github-actions@$EXT_IP \
              "sudo docker exec tw_autotrader_bot python -c 'from scripts.generate_dashboard import main; main()'"
            ssh -i ~/.ssh/gh_actions -o StrictHostKeyChecking=no \
              github-actions@$EXT_IP \
              "cat /home/frank/tw-autotrader/logs/dashboard.html" \
              > ./dashboard.html
          fi
          if [ -s ./dashboard.html ]; then
            echo "✅ dashboard.html 已取得 ($(wc -c < ./dashboard.html) bytes)"
          else
            echo "❌ 無法取得 dashboard.html"
            exit 1
          fi

      - name: Check GIT_PAGE setting
        id: check-gitpage
        run: |
          EXT_IP=$(gcloud compute instances describe tw-autotrader \
            --zone=asia-east1-b --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          mkdir -p ~/.ssh
          echo "${{ secrets.GH_SSH_KEY }}" > ~/.ssh/gh_actions
          chmod 600 ~/.ssh/gh_actions
          GIT_PAGE=$(ssh -i ~/.ssh/gh_actions -o StrictHostKeyChecking=no \
            github-actions@$EXT_IP \
            "grep ^GIT_PAGE= /home/frank/tw-autotrader/.env | cut -d= -f2" 2>/dev/null || echo "off")
          echo "GIT_PAGE=${GIT_PAGE:-off}"
          echo "gitpage=${GIT_PAGE:-off}" >> "$GITHUB_OUTPUT"

      - name: Prepare artifact
        run: |
          cp dashboard.html index.html
          ls -la dashboard.html index.html

      - name: Upload artifact
        if: steps.check-gitpage.outputs.gitpage == 'on'
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        if: steps.check-gitpage.outputs.gitpage == 'on'
        id: deployment
        uses: actions/deploy-pages@v5
