function ddPos(v, h=DD_H) { return (1 - (v-ddMin)/(ddMax-ddMin)) * h; }

    return (i===0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1);

bhFill.setAttribute("fill", "rgba(88,166,255,.08)");
svg.appendChild(bhFill);

const bhLine = document.createElementNS("http://www.w3.org/2000/svg", "path");
bhLine.setAttribute("d", makePath(bhVals, yMin, yMax, H));
bhLine.setAttribute("fill", "none");
bhLine.setAttribute("stroke", "#58a6ff");
bhLine.setAttribute("stroke-width", "2");
svg.appendChild(bhLine);

// Strategy line
const stPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
stPath.setAttribute("d", makePath(stratVals, yMin, yMax, H));
stPath.setAttribute("fill", "none");
stPath.setAttribute("stroke", "#d29922");
stPath.setAttribute("stroke-width", "2.5");
svg.appendChild(stPath);

// Y axis labels
const yLabel = document.getElementById("yLabel");
yLabel.innerHTML = "";
for (let p = 0; p <= 4; p++) {
  const v = yMin + (yMax - yMin) * p / 4;
  const span = document.createElement("span");
  span.textContent = "$" + (v/10000).toFixed(0) + "萬";
  yLabel.appendChild(span);
}

// X axis labels (year marks)
const xLabel = document.getElementById("xLabel");
const yearMarks = [0];
for (let i = 0; i < DATA.length; i++) {
  const d = DATA[i].date;
  if (d.endsWith("01") && i > 0) yearMarks.push(i);
}
yearMarks.push(DATA.length-1);
xLabel.innerHTML = yearMarks.map(i => {
  const pct = (i / (DATA.length-1)) * 100;
  return `<span style="width:${pct > 0 ? (i === DATA.length-1 ? 0 : (yearMarks[yearMarks.indexOf(i)+1]-i)/(DATA.length-1)*100) : yearMarks[1]/(DATA.length-1)*100}%;text-align:${i===0?'left':i===DATA.length-1?'right':'center'}">${DATA[i].date}</span>`;
}).join("");

// Drawdown chart
const ddSvg = document.getElementById("ddChart");
ddSvg.setAttribute("viewBox", `0 0 ${W} ${DD_H}`);

// 0050 dd
const bhDdPath = bhDd.map((v,i) => {
  const x = xPos(i);
  const y = ddPos(v);
  return (i===0?"M":"L") + x.toFixed(1) + "," + y.toFixed(1);
}).join("");
const bhDdLine = document.createElementNS("http://www.w3.org/2000/svg", "path");
bhDdLine.setAttribute("d", bhDdPath);
bhDdLine.setAttribute("fill", "none");
bhDdLine.setAttribute("stroke", "#58a6ff");
bhDdLine.setAttribute("stroke-width", "1.5");
ddSvg.appendChild(bhDdLine);

// Zero line
const zeroLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
zeroLine.setAttribute("x1", PAD.left);
zeroLine.setAttribute("x2", W - PAD.right);
zeroLine.setAttribute("y1", ddPos(0));
zeroLine.setAttribute("y2", ddPos(0));
zeroLine.setAttribute("stroke", "#30363d");
zeroLine.setAttribute("stroke-width", "1");
ddSvg.appendChild(zeroLine);

// Strategy dd
const stDdPath = stratDd.map((v,i) => {
  const x = xPos(i);
  const y = ddPos(v);
  return (i===0?"M":"L") + x.toFixed(1) + "," + y.toFixed(1);
}).join("");
const stDdLine = document.createElementNS("http://www.w3.org/2000/svg", "path");
stDdLine.setAttribute("d", stDdPath);
stDdLine.setAttribute("fill", "none");
stDdLine.setAttribute("stroke", "#d29922");
stDdLine.setAttribute("stroke-width", "2");
ddSvg.appendChild(stDdLine);

// ── Tooltip (mousemove) ──
const tooltip = document.getElementById("tooltip");
const chartArea = document.getElementById("chartArea");

chartArea.addEventListener("mousemove", function(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const pct = mx / rect.width;
  const idx = Math.round(pct * (DATA.length - 1));
  if (idx < 0 || idx >= DATA.length) { tooltip.classList.remove("show"); return; }

  const d = DATA[idx];
  tooltip.innerHTML = `
    <div class="tt-date">${d.date}</div>
    <div class="tt-row"><span><span class="tt-dot" style="background:#58a6ff"></span>0050 DCA</span><span>NT$${fmt(d.buyhold)}</span></div>
    <div class="tt-row"><span><span class="tt-dot" style="background:#d29922"></span>策略配置</span><span>NT$${fmt(d.strategy)}</span></div>
    <div class="tt-row" style="color:#484f58"><span>累計投入</span><span>NT$${fmt(d.invested)}</span></div>
    <div class="tt-row" style="font-size:11px;margin-top:2px;padding-top:4px;border-top:1px solid #21262d">
      <span>回撤</span>
      <span>策略 <span class="${d.strat_dd < -5 ? 'text-red' : 'text-green'}">${d.strat_dd.toFixed(1)}%</span> · 0050 <span class="${d.bh_dd < -5 ? 'text-red' : 'text-green'}">${d.bh_dd.toFixed(1)}%</span></span>
    </div>
  `;

  const tx = Math.min(mx + 12, rect.width - 200);
  const ty = Math.max(10, e.clientY - rect.top - 80);
  tooltip.style.left = tx + "px";
  tooltip.style.top = ty + "px";
  tooltip.classList.add("show");
});

chartArea.addEventListener("mouseleave", function() {
  tooltip.classList.remove("show");
});
</script>
</body>
</html>
